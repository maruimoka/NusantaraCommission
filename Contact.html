href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<body>

     <!-- NAVBAR -->
    <header>
        <nav class="navbar">

            <div class="logo">
                <a href="index.html">
                    <img src="asset/logo.png">
                </a>
            </div>

            <ul class="nav-links">
             <li><a href="Contact.html">CONTACT US</a></li>
            </ul>

            <ul class="nav-links1">
             <li><a href="news.html">NEWS</a></li>
            </ul>

            <div class="search-bar">
                <input type="text" placeholder="Search Artist, Category, etc">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <button id="openLoginBtn" class="login-btn">
                LOGIN
            </button>

            <div id="profileMenu" class="profile-menu" style="display:none;">

            <div class="profile-avatar"></div>
            <button class="menu-btn">
             <i class="fa-solid fa-bars"></i>
            </button>

            <!-- DROPDOWN -->
          <div class="profile-dropdown">
          <a href="Trackerlist-client.html">PROFILE</a>
          <a href="artist-profile.html">ARTIST PAGE</a>
          </div>
            </div>
        </nav>
    </header>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="modal">
                <div class="modal-content">
                <span id="closelogin" class="close-btn">&times;</span>
                <div class="login-form">
                  <form id="loginForm">
                    <h2>WELCOME BACK!!</h2>
                    <div class="form-element">
                          <div class="input-icon">
                            <i class="fa-regular fa-user"></i>
                          </div>
                        <input type="text" id="username" placeholder="username">
                    </div>
                    <div class="form-element">
                        <div class="input-icon">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" id="password" placeholder="password">
                    </div>
                    <label class="remember-me">
                        Belum punya akun? <a href="#" id="showregister">Sign Up</a>
                    </label>
                    <button type="button" id="loginSubmitBtn" class="submit-btn">
                     ENTER
                    </button>
                    </form>
                </div>
                </div>
    </div>

    <!-- SIGN UP MODAL -->
    <div id="registerModal" class="modal">
                <div class="modal-content">
                <span id="closeregister" class="close-btn">&times;</span>
                <div class="login-form">
                  <form id="registerForm">
                    <h2>JOIN US</h2>
                    <div class="form-element">
                        <div class="input-icon">
                            <i class="fa-solid fa-at"></i>
                          </div>
                        <input type="email" id="reg-email" placeholder="Email">
                    </div>
                     <div class="form-element">
                    <div class="input-icon">
                            <i class="fa-regular fa-user"></i>
                          </div>
                        <input type="text" id="reg-username" placeholder="username">
                    </div>
                    <div class="form-element">
                        <div class="input-icon">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" id="reg-password" placeholder="password">
                    </div>
                    <label class="remember-me">
                        Sudah punya akun? <a href="#" id="showlogin">Login</a>
                    </label>
                    <button type="button" id="registerSubmitBtn" class="submit-btn">
                     ENTER
                    </button>
                    </form> 
                </div>
                </div>
    </div>


<!-- CONTACT PAGE -->

<section class="contact">

    <h1>CONTACT US</h1>

    <div class="contact-item">

         <div class="input-icon">
          <img src="asset/discord.png">
        </div>

        <span>Mokad.tsu</span>

    </div>

    <div class="contact-item">

        <img src="asset/email.png">

        <span>Nusantara.Comms@gmail.com</span>

    </div>

</section>
