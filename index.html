<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/order.css">


    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar">

            <div class="logo">
                <img src="asset/logo.png">
            </div>

            <ul class="nav-links">
             <li><a href="Contact.html">CONTACT US</a></li>
            </ul>

            <ul class="nav-links1">
             <li><a href="news.html">NEWS</a></li>
            </ul>

            <div class="search-bar">
                <input type="text" placeholder="Search Artist, Category, etc">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <button id="openLoginBtn" class="login-btn">
                LOGIN
            </button>

            <div id="profileMenu" class="profile-menu" style="display:none;">

            <div class="profile-avatar"></div>
            <button class="menu-btn">
             <i class="fa-solid fa-bars"></i>
            </button>

            <!-- DROPDOWN -->
          <div class="profile-dropdown">
          <a href="Trackerlist-client.html">PROFILE</a>
          <a href="artist-profile.html">ARTIST PAGE</a>
          </div>
            </div>

            
        </nav>
    </header>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="modal">
                <div class="modal-content">
                <span id="closelogin" class="close-btn">&times;</span>
                <div class="login-form">
                  <form id="loginForm" autocomplete="off">
                    <h2>WELCOME BACK!!</h2>
                    <div class="form-element">
                          <div class="input-icon">
                            <i class="fa-regular fa-user"></i>
                          </div>
                        <input type="email" id="username" placeholder="email" autocomplete="off">>
                    </div>

                      <div class="form-element">
                        <div class="input-icon">
                            <i class="fa-solid fa-lock"></i>
                        </div>
        <input
        type="password"
        id="password"
        placeholder="Password"
        autocomplete="off">

    <i
        id="togglePassword"
        class="fa-solid fa-eye password-toggle">
    </i>
                    </div>
                    <label class="remember-me">
                        Belum punya akun? <a href="#" id="showregister">Sign Up</a>
                    </label>
                    <button type="button" id="loginSubmitBtn" class="submit-btn">
                     ENTER
                    </button>
                    </form>
                </div>
                </div>
    </div>

    <!-- SIGN UP MODAL -->
    <div id="registerModal" class="modal">
                <div class="modal-content">
                <span id="closeregister" class="close-btn">&times;</span>
                <div class="login-form">
                  <form id="registerForm" autocomplete="off">
                    <h2>JOIN US</h2>
                    <div class="form-element">
                        <div class="input-icon">
                            <i class="fa-solid fa-at"></i>
                          </div>
                        <input type="email" id="reg-email" placeholder="Email" autocomplete="off">
                    </div>
                     <div class="form-element">
                    <div class="input-icon">
                            <i class="fa-regular fa-user"></i>
                          </div>
                        <input type="text" id="reg-username" placeholder="username" autocomplete="off">
                    </div>
                    <div class="form-element">
                        <div class="input-icon">
                            <i class="fa-solid fa-lock"></i>
                        </div>
        <input
        type="password"
        id="reg-password"
        placeholder="Password"
        autocomplete="new-password">

    <i
        id="toggleRegPassword"
        class="fa-solid fa-eye password-toggle">
    </i>
                    </div>
                    <label class="remember-me">
                        Sudah punya akun? <a href="#" id="showlogin">Login</a>
                    </label>
                    <button type="button" id="registerSubmitBtn" class="submit-btn">
                     ENTER
                    </button>
                    </form> 
                </div>
                </div>
    </div>

    <!-- HERO BANNER -->
    <section class="hero-banner">
         <div class="slider">

        <div class="slide active">
            <img src="asset/Rectangle 37.png" alt="Banner 1">
        </div>

        <div class="slide">
            <img src="asset/Rectangle 38.png" alt="Banner 2">
        </div>

        <div class="slide">
            <img src="asset/Rectangle 39.png" alt="Banner 3">
        </div>

    </div>

    </section>

    <!-- SLIDER DOT -->
    <section class="slider-indicator">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </section>

<!-- ========================= -->
<!-- GALLERY -->
<!-- ========================= -->

<section class="gallery-section">

    <h2><u>GALLERY & COMMISSION</u></h2>

    <div
        id="galleryGrid"
        class="gallery-grid">

    </div>

</section>


<!-- ========================= -->
<!-- PREVIEW MODAL -->
<!-- ========================= -->

<div id="previewModal" class="modal">

    <div class="modal-content preview-modal">

        <span
            id="closePreview"
            class="close-btn">

            &times;

        </span>

        <div class="modal-layout">

            <!-- LEFT -->

            <div class="modal-left">

                <img
                    id="modalImage"
                    class="modal-artwork"
                    src="">

            </div>

            <!-- RIGHT -->

            <div class="modal-right">

                <h2 id="modalTitle"></h2>

                <h3 id="modalPrice"></h3>

                <!-- Artist -->

                <div class="artist-row">

                    <div class="artist-info">

                        <img
                            id="modalArtistAvatar"
                            class="artist-avatar"
                            src="">

                        <a
                            id="modalArtist"
                            href="#">

                        </a>

                    </div>

                    <div class="artist-actions">

                        <button
                            id="orderBtn"
                            class="icon-btn">

                            <i class="fa-solid fa-cart-shopping"></i>

                        </button>

                    </div>

                </div>

                <!-- Description -->

                <div class="description-box">

                    <h3>Description</h3>

                    <p id="modalDescription"></p>

                </div>

            </div>

        </div>

    </div>

</div>


<!-- ========================= -->
<!-- ORDER MODAL -->
<!-- ========================= -->

<div id="commissionModal" class="modal">

    <div id="detailPage">

        <span
            id="closecommission"
            class="close-btn">

            &times;

        </span>

        <img
            id="orderArtworkImage"
            src="">

        <h2 id="orderArtworkTitle"></h2>

        <h3
            id="orderArtworkPrice"
            class="price">

        </h3>

        <label>

            Drop your File / Link for Commission Reference

        </label>

        <div class="upload-box">

            <div id="fileList"></div>

            <label class="add-file-btn">

                + Add File

                <input
                    type="file"
                    id="referenceImage"
                    multiple
                    hidden>

            </label>

        </div>

        <label>

            Details

        </label>

        <textarea
            id="description"
            placeholder="Describe your commission request...">

        </textarea>

        <button
            id="submitOrderBtn">

            SUBMIT

        </button>

    </div>

</div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/order.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/homepage.js"></script>

</body>
</html>
