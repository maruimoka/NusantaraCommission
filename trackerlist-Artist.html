<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>


    <link rel="stylesheet" href="css/tracker.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/gallery.css">
    

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">

            <div class="logo">
                <a href="index.html">
                    <img src="asset/logo.png">
                </a>
            </div>

        <button id="logoutBtn" class="logout-btn">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>

    </nav>
    </header>

<!-- Logout Modal -->
<div class="logout-modal" id="logoutModal">

    <div class="logout-box">

        <span class="close-logout">&times;</span>

        <h2>
            You sure want to <br>
            Log Out?
        </h2>

        <button class="yes-btn" id="confirmLogout">
            Yes
        </button>

        <button class="no-btn" id="cancelLogout">
            No
        </button>

    </div>

</div>


    <!-- Profile Section -->
    <section class="profile-header">

       <div class="profileUser-avatar">

        <img src="asset/imagesbanner1.png"
         id="profileUserImage"> 
        </div>

        <div class="profile-info">
        <h1 id="profileName">
            Momo Tropical
        </h1>
        <p id="profileBio">
            Just came here for order my delulu~
        </p>

        </div>

    </section>

    <!-- Order Tracker -->
 <section class="tracker-wrapper">

    <!-- KIRI -->
    <div class="tracker-sidebar">

        <h2>• Order Status</h2>

    </div>

    <!-- KANAN -->
    <div class="tracker-content">

        <div class="tracker-list" id="trackerList">
            
        </div>

    </div>
<!-- ========================= -->
<!-- TRACKER DETAIL MODAL -->
<!-- ========================= -->

<div id="trackerDetailModal" class="trackerModalArtist">

    <div class="tracker-detail-box">

        <span class="close-detail">&times;</span>

        <!-- Header -->
        <div class="detail-header">

            <div class="client-profile">

                <div class="client-avatar">
                    <img id="clientAvatar">
                </div>

                <h2 id="clientName">
                </h2>

            </div>

            <div class="header-right">
                <button
                    id="changeStatusBtn"
                    class="status">
                    </button>

            </div>

        </div>

        <h1
            class="commission-title"
            id="commissionTitle">
</h1>

<hr>

        <!-- Reference -->

        <label class="section-title">
            File
        </label>

        <div id="referenceList"></div>

        <!-- Description -->

        <label class="section-title">
            Description
        </label>

        <textarea
id="requestDetail"
class="description-area"
readonly>
</textarea>
<hr>

        <!-- Upload -->

        <h2 class="submit-title">

            SUBMIT RESULT

        </h2>

        <div id="resultList"></div>

        <label class="upload-result">

            + Add Result

            <input
                type="file"
                id="resultUpload"
                multiple
                hidden>

        </label>

        <!-- Note -->

        <label class="section-title">

            Note

        </label>

        <textarea
            id="artistNote"
            class="note-area"
            placeholder="Write note for client...">

        </textarea>

        <button id="sendResultBtn" class="send-btn">
    SEND
</button>

    </div>

    </div>
</section>

<div id="statusModal" class="status-modal">

    <div class="status-box">

        <h3>Choose Status</h3>

       <button class="status-option" data-status="WAITING">
    WAITING
</button>

<button class="status-option" data-status="SKETCH">
    SKETCH
</button>

<button class="status-option" data-status="LINEART">
    LINEART
</button>

<button class="status-option" data-status="COLORING">
    COLORING
</button>

<button class="status-option" data-status="REVISION">
    REVISION
</button>

<button class="status-option" data-status="FINISH">
    FINISH
</button>

<button class="status-option" data-status="ON HOLD">
    ON HOLD
</button>

    </div>

</div>

    </div>

    <div id="toast">
    ✔ Submit terkirim!
</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/tracker-artist.js"></script>

</body>
</html>
