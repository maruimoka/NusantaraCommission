<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/order.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/artistfollow.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

     <!-- NAVBAR -->
    <header>
        <nav class="navbar">

            <div class="logo">
                <a href="index.html">
                    <img src="asset/logo.png">
                </a>
            </div>


        <div class="navbar-right">

           <button id="openPostBtn" class="post-btn">
              POST
             <i class="fa-regular fa-paper-plane"></i>
             </button>

            <button id="logoutBtn" class="logout-btn">
               <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>

        </div>
    </header>

<!-- Logout Modal -->
<div class="logout-modal" id="logoutModal">

    <div class="logout-box">

        <span class="close-logout">&times;</span>

        <h2>
            You sure want to <br>
            Log Out?
        </h2>

        <button class="yes-btn" id="confirmLogout">
            Yes
        </button>

        <button class="no-btn" id="cancelLogout">
            No
        </button>

    </div>

</div>

<!-- ========================= -->
<!-- POST MODAL -->
<!-- ========================= -->

<div id="postModal" class="modal">

    <div class="modal-content post-modal">

        <span id="closePostModal" class="close-btn">&times;</span>

        <div class="edit-tab">

            <button
    type="button"
    id="postCommissionTab"
    class="active">
    COMMISSION
</button>

<button
    type="button"
    id="postGalleryTab">
    GALLERY
</button>

        </div>

        <form id="postForm">

            <!-- Upload -->

            <div class="upload-box">

                <input
                    type="file"
                    id="postImageInput"
                    accept="image/*"
                    hidden>

               <label for="postImageInput" class="upload-label">

    <div id="postUploadContent">

        <i class="fa-regular fa-image"></i>

        <h3>DROP YOUR FILE HERE!</h3>

        <p>High resolution photos (PNG, JPG, GIF)</p>

    </div>

    <img
        id="postPreviewImage"
        class="preview-upload-image"
        style="display:none;">

</label>
            </div>

            <label>Title</label>

            <input
                type="text"
                id="postTitle">

            <label>Description</label>

            <textarea
                id="postDescription"></textarea>

            <label id="postPriceLabel">Price</label>

<input
    type="text"
    id="postPrice">

<div class="mature-option">

    <label class="mature-label">

        <input
            type="checkbox"
            id="postMature">

        <span>Mature Content (18+)</span>

    </label>

    <small>
        Check this if this artwork is intended for adults (18+).
    </small>

</div>
            
 <button
    type="button"
    id="savePostBtn"
    class="save-btn">
    POST
</button>



        </form>

    </div>

</div>

<!-- ================= COVER ================= -->

<section class="cover-banner">

</section>


<!-- Banner -->
<section class="profile-banner">

    <img
        id="bannerImage"
        src="asset/default-banner.jpg"
        style="width:100%; height:100%; object-fit:cover; cursor:pointer;">

</section>

<input
    type="file"
    id="bannerInput"
    accept="image/*"
    hidden>
<!-- Profile -->
<!-- ================= PROFILE ================= -->

<section class="artist-profile">
    
 <div class="profileavatar">
     
        <img src="asset/avatar.png">
     
    </div>

    <div class="profile-info">

        <h1 id="profileName">New Artist</h1>

        <p id="profileBio">No bio yet.</p>

        <div class="profile-bottom">

            <div class="follow-stats">

                <div class="stat-item">
                    <span id="followingCount">0</span>
                    <p>Following</p>
                </div>

                <div class="stat-item">
                    <span id="followersCount">0</span>
                    <p>Followers</p>
                </div>

            </div>

            <button class="ordertrack">
                <a href="trackerlist-Artist.html">
                    ORDER LIST
                </a>
            </button>

        </div>

    </div>

</section>



<!-- ================= TAB ================= -->

<div class="profile-tab">

    <button id="commissionTab" class="active">
        COMMISSION
    </button>

    <button id="galleryTab">
        GALLERY
    </button>

</div>


<!-- ================= COMMISSION ================= -->

<section
id="commissionSection"
class="grid">

</section>


<!-- ================= GALLERY ================= -->

<section
id="gallerySection"
class="grid">

</section>


<!-- MODAL COMMISSION DETAIL -->
<div id="previewModal" class="modal">

    <div class="modal-content preview-modal">

        <span id="closePreview" class="close-btn">&times;</span>

        <div class="preview-layout">

            <!-- LEFT -->
            <div class="preview-left">

                <img
id="modalImage"
class="preview-image"
src="">

            </div>

            <!-- RIGHT -->
<div class="preview-right">

    <h1 id="modalTitle"></h1>

    <h2 id="modalPrice"></h2>

    <div
        class="commission-detail"
        id="modalDescription">
    </div>

    <div class="preview-button">

        <button class="edit-btn">
            EDIT
        </button>

        <button class="delete-btn">
            <i class="fa-solid fa-trash"></i>
        </button>

    </div>

</div>

            </div>

        </div>

    </div>

</div>
<!-- ================= EDIT MODAL ================= -->

<div id="editModal" class="modal">

    <div class="modal-content edit-modal">

        <span id="closeEdit" class="close-btn">&times;</span>

        <!-- TAB -->
        <div class="edit-tab">

            <button
                id="editCommissionTab"
                class="active">

                COMMISSION

            </button>

            <button
                id="editGalleryTab">

                GALLERY

            </button>

        </div>

        <!-- Upload -->

        <div class="upload-box">

    <input
        type="file"
        id="imageInput"
        accept="image/*"
        hidden>

    <label
        for="imageInput"
        class="upload-label">

        <!-- Preview -->
        <img
            id="imagePreview"
            class="image-preview"
            style="display:none;">

        <!-- Upload Icon -->
        <div id="uploadContent">

            <i class="fa-regular fa-image"></i>

            <h3>DROP YOUR FILE HERE!</h3>

            <p>
                High resolution photos (PNG, JPG)
            </p>

        </div>

    </label>

</div>

        <!-- Title -->

        <label>Title</label>

        <input
            type="text"
            id="editTitle"
            placeholder="Title">

        <!-- Description -->

        <label>Description</label>

        <textarea
            id="editDescription"
            placeholder="Description"></textarea>

        <!-- Price -->

        <label id="priceLabel">

            Price

        </label>

        <input
            type="text"
            id="editPrice"
            placeholder="Price">

<div class="mature-option">
     <label class="mature-label">
<input
type="checkbox"
id="editMature">

  <span>Mature Content (18+)</span>

</label>

     <small>
        Check this if this artwork is intended for adults (18+).
    </small>
</div>
        
        <button
            id="saveEditBtn"
            class="save-btn">

            SAVE

        </button>

    </div>

</div>

<div id="toast">
           ✔ Data berhasil disimpan!
        </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="js/profile-artist.js"></script>
<script src="js/logout.js"> </script>

</body>
</html>
