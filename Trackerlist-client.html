<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>

    <link rel="stylesheet" href="css/tracker.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/gallery.css">
    

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">

            <div class="logo">
                <a href="index.html">
                    <img src="asset/logo.png">
                </a>
            </div>

        <button id="logoutBtn" class="logout-btn">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>

    </nav>
    </header>
<!-- LOGOUT MODAL -->
<div class="logout-modal" id="logoutModal">

    <div class="logout-box">

        <span class="close-logout">&times;</span>

        <h2>
            You sure want to <br>
            Log Out?
        </h2>

        <button class="yes-btn" id="confirmLogout">
            Yes
        </button>

        <button class="no-btn" id="cancelLogout">
            No
        </button>

    </div>

</div>


    <!-- Profile Section -->
    <section class="profile-header">

       <div class="profileUser-avatar">

        <img src="asset/imagesbanner1.png"
         id="profileUserImage"> 
        </div>

        <div class="profile-info">
        <h1 id="profileName">
            Momo Tropical
        </h1>
        <p id="profileBio">
            Just came here for order my delulu~
        </p>

        </div>

        <button
class="edit-profile-btn"
id="openEditProfile">
    EDIT PROFILE
</button>

    </section>

    <!-- Order Tracker -->
 <section class="tracker-wrapper">

    <!-- KIRI -->
    <div class="tracker-sidebar">

        <h2>• Order Status</h2>

    </div>

    <!-- KANAN -->
    <div class="tracker-content">

      <div class="tracker-list" id="trackerList">
      </div>

</section>

    <!-- Tracker Modal -->
    <div class="tracker-modal" id="trackerModal">

    <div class="tracker-box">

        <span class="close">&times;</span>

        <div class="tracker-left">

           <img id="trackerImage">

        </div>

<div class="tracker-right">

    <span id="trackerStatus" class="status"></span>

    <h2 id="trackerTitle"></h2>

    <h1 id="trackerPrice"></h1>

    <div class="artist-info">

        <div class="artist-avatar">
            <img id="trackerArtistAvatar">
        </div>

        <span id="trackerArtist"></span>

    </div>

    <h3>Request</h3>

    <p id="trackerRequest"></p>

    <h3>Reference Files</h3>

    <div id="trackerReferenceList"></div>

<div id="resultWrapper">

    <h3>Result</h3>

    <div id="resultSection">

        <button id="openResultBtn">
            OPEN
        </button>

    </div>

</div>

</div> 
</div>
</div> 
    
<!-- EDIT PROFILE MODAL -->
<div id="editProfileModal" class="modal">

    <div class="modal-content edit-profile-modal">

        <span id="closeEditProfile" class="close-btn">&times;</span>

        <div class="profile-edit-header">

            <div class="edit-avatar">

                <img
                    id="editAvatarPreview"
                    src="asset/imagesbanner1.png">

            </div>

            <div class="edit-upload">

                <input
                    type="file"
                    id="avatarInput"
                    accept="image/*"
                    hidden>

                <label
                    for="avatarInput"
                    class="upload-avatar-btn">

                    SELECT IMAGE

                </label>

                <p>JPG, GIF or PNG. Max size of 5MB</p>

            </div>

        </div>

        <label>Name</label>

        <input
            type="text"
            id="editName">

        <label>Description</label>

        <textarea
            id="editBio"></textarea>

        <label>Social Media</label>

        <input
            type="text"
            id="editSocial">

        <label class="adult-label">

        <input
            type="checkbox"
            id="adultVerified">

        <span>I am 18 years old or older</span>

    </label>

    <small>
        Enable this option to allow mature (18+) artwork to appear throughout the website.
    </small>

</div>

        <button
            id="saveProfileBtn"
            class="save-btn">

            SAVE

        </button>

    </div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="js/tracker.js"></script>
    <script src="js/logout.js"></script>

</body>
</html>
