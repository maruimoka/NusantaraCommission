<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Nusantara Commission | Messages</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/chat.css">
     <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/modal.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

<!-- =========================
        NAVBAR
========================= -->

  <header>
        <nav class="navbar">

            <div class="logo">
                <a href="index.html">
                    <img src="asset/logo.png">
                </a>
            </div>

        <button id="logoutBtn" class="logout-btn">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>

    </nav>
    </header>
<!-- LOGOUT MODAL -->
<div class="logout-modal" id="logoutModal">

    <div class="logout-box">

        <span class="close-logout">&times;</span>

        <h2>
            You sure want to <br>
            Log Out?
        </h2>

        <button class="yes-btn" id="confirmLogout">
            Yes
        </button>

        <button class="no-btn" id="cancelLogout">
            No
        </button>

    </div>

</div>


<!-- =========================
        CHAT CONTAINER
========================= -->

<div class="chat-container">


    <!-- =====================
            SIDEBAR
    ====================== -->

    <aside class="chat-sidebar">

        <div class="sidebar-header">

            <h2>Messages</h2>

        </div>

        <div class="search-box">

            <input
            type="text"
            id="searchConversation"
            placeholder="Search conversation...">

        </div>

        <div
        class="conversation-list"
        id="conversationList">

            <!-- JS -->

        </div>

    </aside>



    <!-- =====================
            CHAT ROOM
    ====================== -->

    <section class="chat-room">


        <!-- HEADER -->

        <div class="chat-header">

            <div class="chat-user">

                <img
                src="asset/default-profile.png"
                id="chatAvatar">

                <div>

                    <h3 id="chatName">

                        Select Conversation

                    </h3>

                    <span id="chatStatus">

                        Offline

                    </span>

                </div>

            </div>


            <div class="chat-action">

                <button id="viewProfileBtn">

                    View Profile

                </button>

            </div>

        </div>


        <!-- BODY -->

        <div
        class="chat-body"
        id="chatBody">

            <div class="empty-chat">

                <i class="fa-regular fa-comments"></i>

                <h2>

                    Welcome to Messages

                </h2>

                <p>

                    Select a conversation to start chatting.

                </p>

            </div>

        </div>



        <!-- INPUT -->

        <div class="chat-input">

            <button
            id="uploadImageBtn">

                <i class="fa-solid fa-paperclip"></i>

            </button>

            <input
            type="text"
            id="messageInput"
            placeholder="Type your message...">

            <button
            id="sendBtn">

                <i class="fa-solid fa-paper-plane"></i>

            </button>

        </div>


    </section>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="js/chat.js"></script>
<script src="js/logout.js"></script>

</body>
</html>
